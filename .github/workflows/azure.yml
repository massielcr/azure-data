name: Deploy to Azure

on:
  push:
    branches: [ "main" ]

# Crucial for OIDC: This requests the JWT token from GitHub's OIDC provider
permissions:
  id-token: write
  contents: read

jobs:
  azure-login-demo:
    runs-on: ubuntu-latest
    steps:
    
    # 1. Log into Azure securely without passwords/secrets
    - name: Az CLI Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # 2. Run your Azure commands
    - name: Run Azure CLI commands
      run: |
        az account show
        az group list --output table
