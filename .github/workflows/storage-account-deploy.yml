name: Deploy Azure Storage Account - Queue

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Downloads repository's files onto the temporary GitHub server so workflow steps can access and use them
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1b. DEBUG STEP: Show exactly what files were downloaded
      - name: List Files in Workspace
        run: |
          echo "Current working directory:"
          pwd
          echo "Files in root directory:"
          ls -la

      # 2. Log into Azure securely without passwords/secrets
      - name: Az CLI Login 
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 3. Deploy a resource group
      - name: Deploy Azure Storage Resource Group
        uses: azure/bicep-deploy@v1
        with:
          type: 'deployment'
          scope: 'subscription'
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          location: 'canadacentral'
          operation: 'create'
          template-file: './resource-group-create.json'
          parameters-file: './storage-account-create-parameters.json'
