name: Deploy Azure Storage Account - Queue

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Downloads repository files
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Log into Azure securely
      - name: Az CLI Login 
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 3. Deploy a resource group using native Azure CLI
      - name: Deploy Azure Resource Group
        id: deploy_rg
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment sub create \
              --location canadacentral \
              --template-file ./IaC/resource-group-create.json \
              --parameters ./IaC/azure-data-parameters.json \
              --handle-extended-json-format

      # 4. Deploy a storage account using native Azure CLI
      - name: Deploy Azure Storage Account
        id: deploy_storage
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage account create \
              --name deploy_storage
              --template-file ./IaC/resource-group-create.json \
              --parameters ./IaC/azure-data-parameters.json
