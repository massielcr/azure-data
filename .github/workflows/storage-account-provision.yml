name: Provision Azure Storage Account

on:
  # Allows this file to be run manually from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      location:
        description: Azure deployment location
        required: false
        default: canadacentral
      resourceGroupName:
        description: Name of the resource group
        required: false
        default: azure-data-storage-rg
      storageAccountType:
        description: Storage account SKU
        required: false
        default: Standard_LRS

  # Allows this file to be called as a reusable workflow by another workflow
  workflow_call:
    inputs:
      location:
        type: string
        required: false
        default: canadacentral
      resourceGroupName:
        type: string
        required: false
        default: azure-data-storage-rg
      storageAccountType:
        type: string
        required: false
        default: Standard_LRS
    outputs:
      resource_group_name:
        description: "The name of the deployed resource group"
        value: ${{ jobs.deploy.outputs.rg_name }}
      storage_account_name:
        description: "The name of the deployed storage account"
        value: ${{ jobs.deploy.outputs.storage_name }}

permissions:
  id-token: write
  contents: read

concurrency:
  group: storage-account-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      rg_name: ${{ steps.deploy_rg.outputs.rg_name }}
      storage_name: ${{ steps.deploy_storage.outputs.storage_account_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Az CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Resource Group template
        uses: azure/cli@v2
        with:
          azcliversion: 2.79.0
          inlineScript: |
            az deployment sub validate \
              --location "${{ inputs.location }}" \
              --template-file ./IaC/resource-group-create.json \
              --parameters ./IaC/azure-data-parameters.json \
              --parameters location="${{ inputs.location }}" \
                           resourceGroupName="${{ inputs.resourceGroupName }}"

      - name: Create Resource Group
        id: deploy_rg
        uses: azure/cli@v2
        with:
          azcliversion: 2.79.0
          inlineScript: |
            RG_NAME=$(az deployment sub create \
              --location "${{ inputs.location }}" \
              --template-file ./IaC/resource-group-create.json \
              --parameters ./IaC/azure-data-parameters.json \
              --parameters location="${{ inputs.location }}" \
                           resourceGroupName="${{ inputs.resourceGroupName }}" \
              --query "properties.outputs.resourceGroupName.value" \
              --output tsv)
            echo "rg_name=$RG_NAME" >> $GITHUB_OUTPUT
            echo "Resource group deployed: ${RG_NAME}"

      - name: Validate Storage Account template
        uses: azure/cli@v2
        with:
          azcliversion: 2.79.0
          inlineScript: |
            az deployment group validate \
              --resource-group "${{ steps.deploy_rg.outputs.rg_name }}" \
              --template-file ./IaC/storage-account-create.json \
              --parameters ./IaC/azure-data-parameters.json \
              --parameters location="${{ inputs.location }}" \
                           storageAccountType="${{ inputs.storageAccountType }}"

      - name: Create Storage Account
        id: deploy_storage
        uses: azure/cli@v2
        with:
          azcliversion: 2.79.0
          inlineScript: |
            STORAGE_NAME=$(az deployment group create \
              --resource-group "${{ steps.deploy_rg.outputs.rg_name }}" \
              --template-file ./IaC/storage-account-create.json \
              --parameters ./IaC/azure-data-parameters.json \
              --parameters location="${{ inputs.location }}" \
                           storageAccountType="${{ inputs.storageAccountType }}" \
              --query "properties.outputs.storageAccountName.value" \
              --output tsv)
            echo "storage_account_name=$STORAGE_NAME" >> $GITHUB_OUTPUT
            echo "Storage account deployed: ${STORAGE_NAME}"
