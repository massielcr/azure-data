name: Provision Azure Storage Account - Queue

on:
  workflow_dispatch:
    inputs:
      location:
        description: Azure deployment location
        required: false
        default: canadacentral
      resourceGroupName:
        description: Name of the resource group
        required: false
        default: azure-data-storage-rg
      storageAccountType:
        description: Storage account SKU
        required: false
        default: Standard_LRS
      queueName:
        description: Name of the queue
        required: false
        default: mcrqueue

permissions:
  id-token: write
  contents: read

concurrency:
  group: storage-account-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  provision-storage-account:
    uses: ./.github/workflows/storage-account-provision.yml
    with:
      location: ${{ inputs.location }}
      resourceGroupName: ${{ inputs.resourceGroupName }}
      storageAccountType: ${{ inputs.storageAccountType }}
    secrets: inherit

  provision-queue:
    needs: provision-storage-account
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Az CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Queue template
        uses: azure/cli@v2
        with:
          azcliversion: 2.79.0
          inlineScript: |
            az deployment group validate \
              --resource-group "${{ needs.provision-storage-account.outputs.resource_group_name }}" \
              --template-file ./IaC/queue-create.json \
              --parameters ./IaC/azure-data-parameters.json \
              --parameters location="${{ inputs.location }}" \
                           queueName="${{ inputs.queueName }}" \
                           storageAccountName="${{ needs.provision-storage-account.outputs.storage_account_name }}"

      - name: Create Queue
        id: deploy_queue
        uses: azure/cli@v2
        with:
          azcliversion: 2.79.0
          inlineScript: |
            QUEUE_NAME=$(az deployment group create \
              --resource-group "${{ needs.provision-storage-account.outputs.resource_group_name }}" \
              --template-file ./IaC/queue-create.json \
              --parameters ./IaC/azure-data-parameters.json \
              --parameters location="${{ inputs.location }}" \
                           queueName="${{ inputs.queueName }}" \
                           storageAccountName="${{ needs.provision-storage-account.outputs.storage_account_name }}" \
              --query "properties.outputs.queueName.value" \
              --output tsv)
            echo "queue_name=$QUEUE_NAME" >> $GITHUB_OUTPUT
            echo "Queue deployed: ${QUEUE_NAME}"
